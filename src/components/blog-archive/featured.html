<div>
<!--%item-start%-->
  <article class="note">
    <a class="note-row" href="{{url}}">
      <div class="note-eyebrow">
        <span class="note-date">{{date}}</span>
        <span class="sep">·</span>
        <span>{{readingTime}}</span>{{categoriesHtml}}
      </div>
      <h3 class="note-title">{{title}}</h3>
      <p class="note-dek">{{excerpt}}</p>
    </a>
  </article>
<!--%item-end%-->
</div>
