<article class="note-page">
  <a class="back" href="/">← all notes</a>
  <div class="note-page-meta">
    {{categoriesLinksHtml}}
    <span>{{readingTime}}</span>
    <span>{{date}}</span>
  </div>
  <h1 class="note-page-title">{{title}}</h1>
  <p class="note-page-dek">{{excerpt}}</p>
  <div class="prose note-page-body">
    <!--%body%-->
  </div>
  <!--%related%-->

  <div class="comments">
    <p class="page-eyebrow">comments</p>
    <script src="https://giscus.app/client.js"
            data-repo="tosinamuda/website"
            data-repo-id="R_kgDOKbhZxA"
            data-category="General"
            data-category-id="DIC_kwDOKbhZxM4C7lUo"
            data-mapping="pathname"
            data-strict="0"
            data-reactions-enabled="1"
            data-emit-metadata="0"
            data-input-position="bottom"
            data-theme="preferred_color_scheme"
            data-lang="en"
            crossorigin="anonymous"
            async></script>
  </div>
</article>
